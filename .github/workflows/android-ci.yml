name: Android CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: tools platform-tools platforms;android-35 build-tools;35.0.0

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Generate JaCoCo coverage report
        run: ./gradlew :app:jacocoTestReport --stacktrace

      - name: Upload JaCoCo HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-html-report
          path: app/build/reports/jacoco/jacocoTestReport/html/

      - name: Upload JaCoCo XML (Codecov / badge tools)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-xml-report
          path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
